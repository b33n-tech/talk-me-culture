<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ponti</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Literata:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500;600&display=swap');

  :root {
    --cream: #faf8f4;
    --cream-dark: #f2ede4;
    --cream-border: #e8e0d0;
    --ink: #1a1714;
    --ink-soft: #4a4540;
    --ink-muted: #8a8178;
    --accent: #b85c2a;
    --accent-light: #f5e8df;
    --accent-soft: #e8c4a8;
    --success: #3a7d5c;
    --success-light: #e8f4ee;
    --font-size-base: 16px;
    --radius: 12px;
    --radius-sm: 8px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html { font-size: var(--font-size-base); }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--cream);
    color: var(--ink);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ── SCREENS ─────────────────────────────────── */
  .screen { display: none; flex-direction: column; min-height: 100vh; }
  .screen.active { display: flex; }

  /* ── SETUP SCREEN ────────────────────────────── */
  #screen-setup {
    align-items: center;
    justify-content: center;
    padding: 2rem 1.5rem;
    background: var(--cream);
  }

  .setup-card {
    width: 100%;
    max-width: 480px;
    background: white;
    border: 1.5px solid var(--cream-border);
    border-radius: 20px;
    padding: 2.5rem 2rem;
    box-shadow: 0 4px 32px rgba(26,23,20,0.07);
  }

  .logo {
    font-family: 'Literata', serif;
    font-size: 2.2rem;
    font-weight: 300;
    color: var(--ink);
    letter-spacing: -0.02em;
    margin-bottom: 0.2rem;
  }

  .logo span { color: var(--accent); }

  .tagline {
    font-size: 0.82rem;
    color: var(--ink-muted);
    margin-bottom: 2rem;
    font-style: italic;
    font-family: 'Literata', serif;
  }

  .field-group { margin-bottom: 1.2rem; }

  label {
    display: block;
    font-size: 0.78rem;
    font-weight: 600;
    color: var(--ink-soft);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 0.5rem;
  }

  input[type="text"], input[type="password"], select {
    width: 100%;
    padding: 0.75rem 1rem;
    border: 1.5px solid var(--cream-border);
    border-radius: var(--radius-sm);
    font-family: 'DM Sans', sans-serif;
    font-size: 1rem;
    color: var(--ink);
    background: var(--cream);
    outline: none;
    transition: border-color 0.2s;
    -webkit-appearance: none;
  }

  input[type="text"]:focus,
  input[type="password"]:focus,
  select:focus { border-color: var(--accent); background: white; }

  select { cursor: pointer; }

  .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 0.5rem;
    padding: 0.85rem 1.5rem;
    border-radius: var(--radius-sm);
    font-family: 'DM Sans', sans-serif;
    font-size: 1rem;
    font-weight: 500;
    cursor: pointer;
    border: none;
    transition: all 0.18s;
  }

  .btn-primary {
    background: var(--ink);
    color: white;
    width: 100%;
  }

  .btn-primary:hover { background: var(--accent); }

  .btn-ghost {
    background: transparent;
    color: var(--ink-soft);
    border: 1.5px solid var(--cream-border);
    font-size: 0.88rem;
    padding: 0.5rem 1rem;
  }

  .btn-ghost:hover { border-color: var(--ink-soft); color: var(--ink); }

  .divider {
    border: none;
    border-top: 1px solid var(--cream-border);
    margin: 1.5rem 0;
  }

  .supabase-section summary {
    font-size: 0.8rem;
    color: var(--ink-muted);
    cursor: pointer;
    user-select: none;
    padding: 0.3rem 0;
  }

  .supabase-section summary:hover { color: var(--ink-soft); }

  .supabase-fields { margin-top: 1rem; }

  .code-display {
    background: var(--accent-light);
    border: 1.5px solid var(--accent-soft);
    border-radius: var(--radius-sm);
    padding: 0.8rem 1rem;
    font-family: 'Literata', serif;
    font-size: 1.4rem;
    letter-spacing: 0.15em;
    color: var(--accent);
    text-align: center;
    margin: 0.5rem 0 1rem;
  }

  .hint { font-size: 0.78rem; color: var(--ink-muted); margin-top: 0.35rem; }

  /* ── FONT SIZE CONTROL ───────────────────────── */
  .font-ctrl {
    display: flex;
    align-items: center;
    gap: 0.6rem;
    margin-top: 0.8rem;
  }

  .font-ctrl span { font-size: 0.78rem; color: var(--ink-muted); flex: 1; }

  .font-btn {
    width: 32px; height: 32px;
    border-radius: 50%;
    border: 1.5px solid var(--cream-border);
    background: white;
    font-size: 1.1rem;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    color: var(--ink-soft);
    transition: all 0.15s;
  }

  .font-btn:hover { border-color: var(--accent); color: var(--accent); }

  /* ── CHAT SCREEN ─────────────────────────────── */
  #screen-chat { flex-direction: column; height: 100vh; }

  .chat-header {
    background: white;
    border-bottom: 1px solid var(--cream-border);
    padding: 0.9rem 1.2rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }

  .chat-header-left { display: flex; align-items: center; gap: 0.8rem; }

  .logo-sm {
    font-family: 'Literata', serif;
    font-size: 1.3rem;
    font-weight: 300;
    color: var(--ink);
  }

  .logo-sm span { color: var(--accent); }

  .conv-badge {
    background: var(--cream-dark);
    border: 1px solid var(--cream-border);
    border-radius: 20px;
    padding: 0.2rem 0.7rem;
    font-size: 0.75rem;
    color: var(--ink-soft);
    font-family: 'DM Sans', sans-serif;
    letter-spacing: 0.05em;
  }

  .header-right { display: flex; align-items: center; gap: 0.5rem; }

  .user-pill {
    display: flex;
    align-items: center;
    gap: 0.4rem;
    background: var(--accent-light);
    border-radius: 20px;
    padding: 0.25rem 0.8rem 0.25rem 0.25rem;
    font-size: 0.82rem;
    color: var(--accent);
    font-weight: 500;
  }

  .lang-dot {
    width: 22px; height: 22px;
    border-radius: 50%;
    background: var(--accent);
    color: white;
    font-size: 0.62rem;
    font-weight: 700;
    display: flex; align-items: center; justify-content: center;
    letter-spacing: 0;
  }

  /* ── MESSAGES AREA ───────────────────────────── */
  .messages-area {
    flex: 1;
    overflow-y: auto;
    padding: 1.2rem 1rem;
    display: flex;
    flex-direction: column;
    gap: 0.7rem;
  }

  .msg-row {
    display: flex;
    flex-direction: column;
    max-width: 72%;
    animation: fadeUp 0.25s ease;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .msg-row.mine { align-self: flex-end; align-items: flex-end; }
  .msg-row.theirs { align-self: flex-start; align-items: flex-start; }

  .msg-bubble {
    padding: 0.75rem 1rem;
    border-radius: 16px;
    font-size: 0.95rem;
    line-height: 1.55;
  }

  .msg-row.mine .msg-bubble {
    background: var(--ink);
    color: white;
    border-bottom-right-radius: 4px;
  }

  .msg-row.theirs .msg-bubble {
    background: white;
    border: 1.5px solid var(--cream-border);
    color: var(--ink);
    border-bottom-left-radius: 4px;
  }

  .msg-meta {
    font-size: 0.7rem;
    color: var(--ink-muted);
    margin-top: 0.3rem;
    padding: 0 0.3rem;
  }

  .msg-equiv {
    font-size: 0.72rem;
    font-style: italic;
    color: var(--ink-muted);
    margin-top: 0.25rem;
    padding: 0 0.3rem;
    max-width: 100%;
  }

  .msg-row.theirs .msg-equiv { color: var(--accent); }

  .system-msg {
    text-align: center;
    font-size: 0.75rem;
    color: var(--ink-muted);
    font-style: italic;
    font-family: 'Literata', serif;
    padding: 0.5rem;
  }

  /* ── COMPOSER ────────────────────────────────── */
  .composer {
    background: white;
    border-top: 1px solid var(--cream-border);
    flex-shrink: 0;
  }

  .category-strip {
    display: flex;
    gap: 0.4rem;
    padding: 0.8rem 1rem 0.5rem;
    overflow-x: auto;
    scrollbar-width: none;
  }

  .category-strip::-webkit-scrollbar { display: none; }

  .cat-pill {
    flex-shrink: 0;
    padding: 0.35rem 0.9rem;
    border-radius: 20px;
    border: 1.5px solid var(--cream-border);
    background: var(--cream);
    font-size: 0.8rem;
    color: var(--ink-soft);
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
    font-family: 'DM Sans', sans-serif;
  }

  .cat-pill:hover { border-color: var(--accent-soft); color: var(--accent); }
  .cat-pill.active { background: var(--ink); color: white; border-color: var(--ink); }

  .messages-grid {
    padding: 0.5rem 1rem 1rem;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0.45rem;
    max-height: 220px;
    overflow-y: auto;
    scrollbar-width: thin;
    scrollbar-color: var(--cream-border) transparent;
  }

  .msg-item {
    padding: 0.6rem 0.75rem;
    border-radius: var(--radius-sm);
    border: 1.5px solid var(--cream-border);
    background: var(--cream);
    font-size: 0.83rem;
    color: var(--ink-soft);
    cursor: pointer;
    transition: all 0.15s;
    line-height: 1.4;
    text-align: left;
  }

  .msg-item:hover {
    border-color: var(--accent-soft);
    background: var(--accent-light);
    color: var(--ink);
  }

  .msg-item.selected {
    border-color: var(--accent);
    background: var(--accent-light);
    color: var(--accent);
    font-weight: 500;
  }

  .send-row {
    display: flex;
    align-items: center;
    gap: 0.6rem;
    padding: 0.6rem 1rem 1rem;
    border-top: 1px solid var(--cream-border);
  }

  .selected-preview {
    flex: 1;
    padding: 0.6rem 1rem;
    border-radius: var(--radius-sm);
    border: 1.5px solid var(--cream-border);
    background: var(--cream);
    font-size: 0.88rem;
    color: var(--ink-soft);
    font-style: italic;
    min-height: 42px;
    display: flex;
    align-items: center;
  }

  .selected-preview.has-msg {
    border-color: var(--accent-soft);
    color: var(--ink);
    font-style: normal;
    background: white;
  }

  .btn-send {
    width: 44px; height: 44px;
    border-radius: 50%;
    background: var(--ink);
    border: none;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.18s;
    flex-shrink: 0;
  }

  .btn-send:hover { background: var(--accent); }
  .btn-send:disabled { background: var(--cream-border); cursor: not-allowed; }

  .btn-send svg { fill: white; }

  /* ── STATUS INDICATOR ────────────────────────── */
  .status-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--cream-border);
    display: inline-block;
    margin-right: 0.3rem;
    transition: background 0.3s;
  }

  .status-dot.connected { background: var(--success); }
  .status-dot.waiting { background: #c9a227; animation: pulse 1.5s infinite; }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  .status-label {
    font-size: 0.72rem;
    color: var(--ink-muted);
  }

  /* ── FONT SIZE CTRL IN CHAT ──────────────────── */
  .chat-font-ctrl {
    display: flex;
    align-items: center;
    gap: 0.3rem;
  }

  .font-btn-sm {
    width: 26px; height: 26px;
    border-radius: 50%;
    border: 1.5px solid var(--cream-border);
    background: transparent;
    font-size: 0.9rem;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    color: var(--ink-muted);
    transition: all 0.15s;
    line-height: 1;
  }

  .font-btn-sm:hover { border-color: var(--ink-soft); color: var(--ink); }

  /* ── TOAST ───────────────────────────────────── */
  .toast {
    position: fixed;
    bottom: 2rem;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--ink);
    color: white;
    padding: 0.6rem 1.2rem;
    border-radius: 20px;
    font-size: 0.82rem;
    opacity: 0;
    transition: all 0.3s;
    pointer-events: none;
    z-index: 999;
    white-space: nowrap;
  }

  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* ── SCROLLBAR ───────────────────────────────── */
  .messages-area::-webkit-scrollbar { width: 4px; }
  .messages-area::-webkit-scrollbar-track { background: transparent; }
  .messages-area::-webkit-scrollbar-thumb { background: var(--cream-border); border-radius: 2px; }

  /* ── RESPONSIVE ──────────────────────────────── */
  @media (max-width: 480px) {
    .messages-grid { grid-template-columns: 1fr; max-height: 180px; }
    .msg-row { max-width: 88%; }
    .setup-card { padding: 2rem 1.2rem; }
  }

  .empty-state {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: var(--ink-muted);
    font-family: 'Literata', serif;
    font-style: italic;
    font-size: 0.92rem;
    gap: 0.5rem;
    padding: 2rem;
    text-align: center;
  }

  .empty-icon { font-size: 2rem; opacity: 0.4; }
</style>
</head>
<body>

<!-- ══════════════════════════════════════════════
     SCREEN 1 : SETUP
══════════════════════════════════════════════ -->
<div id="screen-setup" class="screen active">
  <div class="setup-card">
    <div class="logo">P<span>o</span>nti</div>
    <div class="tagline">Des ponts, pas des murs.</div>

    <div class="field-group">
      <label id="lbl-name">Votre prénom</label>
      <input type="text" id="inp-name" placeholder="…" maxlength="32">
    </div>

    <div class="field-group">
      <label id="lbl-lang">Votre langue</label>
      <select id="inp-lang" onchange="applyLang()">
        <option value="fr">🇫🇷 Français</option>
        <option value="en">🇬🇧 English</option>
        <option value="es">🇪🇸 Español</option>
        <option value="zh">🇨🇳 普通话 (Mandarin)</option>
        <option value="ar">🇸🇦 العربية</option>
        <option value="fa">🇮🇷 فارسی</option>
      </select>
    </div>

    <div class="field-group">
      <label id="lbl-conv">Code conversation</label>
      <input type="text" id="inp-conv" placeholder="CO0235" maxlength="8"
             style="letter-spacing:0.1em; text-transform:uppercase"
             oninput="this.value=this.value.toUpperCase()">
      <div class="hint" id="hint-conv">Le code partagé avec votre interlocuteur·rice.</div>
    </div>

    <!-- Font size -->
    <div class="font-ctrl">
      <span id="lbl-fontsize">Taille du texte</span>
      <button class="font-btn" onclick="changeFont(-1)" title="Réduire">A−</button>
      <button class="font-btn" onclick="changeFont(1)"  title="Agrandir">A+</button>
    </div>

    <hr class="divider">

    <button class="btn btn-primary" onclick="startChat()" id="btn-start">
      Commencer →
    </button>
  </div>
</div>

<!-- ══════════════════════════════════════════════
     SCREEN 2 : CHAT
══════════════════════════════════════════════ -->
<div id="screen-chat" class="screen">

  <!-- HEADER -->
  <div class="chat-header">
    <div class="chat-header-left">
      <div class="logo-sm">P<span>o</span>nti</div>
      <div class="conv-badge" id="conv-badge">CO0235</div>
      <span class="status-dot waiting" id="status-dot"></span>
      <span class="status-label" id="status-label">…</span>
    </div>
    <div class="header-right">
      <div class="user-pill">
        <div class="lang-dot" id="lang-dot">FR</div>
        <span id="header-name">—</span>
      </div>
      <div class="chat-font-ctrl">
        <button class="font-btn-sm" onclick="changeFont(-1)">A−</button>
        <button class="font-btn-sm" onclick="changeFont(1)">A+</button>
      </div>
      <button class="btn-ghost" onclick="goSetup()" id="btn-back" style="padding:0.3rem 0.7rem;font-size:0.75rem">⚙</button>
    </div>
  </div>

  <!-- MESSAGES -->
  <div class="messages-area" id="messages-area">
    <div class="empty-state" id="empty-state">
      <div class="empty-icon">🌐</div>
      <span id="empty-text">En attente de la connexion…</span>
    </div>
  </div>

  <!-- COMPOSER -->
  <div class="composer">
    <div class="category-strip" id="category-strip"></div>
    <div class="messages-grid" id="messages-grid"></div>
    <div class="send-row">
      <div class="selected-preview" id="selected-preview" id="sel-prev">
        <span id="sel-prev-text"></span>
      </div>
      <button class="btn-send" id="btn-send" disabled onclick="sendMessage()">
        <svg width="18" height="18" viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2v7z"/></svg>
      </button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
/* ═══════════════════════════════════════════

/* ═══════════════════════════════════════════
   MESSAGE LIBRARY
   Structure: categories[lang] = [ { cat, items:[{id, text}] } ]
═══════════════════════════════════════════ */
// Each message has an ID; equivalences are matched by ID across languages.
// 10 categories × 12 messages = 120 items per language

const MSG = {
  fr: [
    { cat:"👋 Salutations", items:[
      {id:"g01", t:"Bonjour, je suis content·e qu'on se parle."},
      {id:"g02", t:"Bonsoir ! Comment tu vas ?"},
      {id:"g03", t:"Ça fait plaisir de te retrouver."},
      {id:"g04", t:"Je pense à toi."},
      {id:"g05", t:"Comment s'est passée ta journée ?"},
      {id:"g06", t:"Tu as l'air occupé·e, on peut parler plus tard."},

/* ═══════════════════════════════════════════
   STATE
═══════════════════════════════════════════ */
const STATE = {
  lang: 'fr',
  name: '',
  conv: '',
  userId: null,
  selectedMsg: null,
  selectedCat: 0,
  supaClient: null,
  pollInterval: null,
  lastMsgId: 0,
  connected: false,
  messages: [],
  fontSize: 16
};

/* ═══════════════════════════════════════════
   PERSISTENCE
═══════════════════════════════════════════ */
function save() {
  localStorage.setItem('ponti_state', JSON.stringify({
    lang: STATE.lang, name: STATE.name, conv: STATE.conv,
    userId: STATE.userId, fontSize: STATE.fontSize
  }));
}

function load() {
  try {
    const s = JSON.parse(localStorage.getItem('ponti_state') || '{}');
    if (s.lang)     STATE.lang    = s.lang;
    if (s.name)     STATE.name    = s.name;
    if (s.conv)     STATE.conv    = s.conv;
    if (s.userId)   STATE.userId  = s.userId;
    if (s.fontSize) STATE.fontSize = s.fontSize;
  } catch(e) {}
}

function genUserId() {
  return 'U' + Math.random().toString(36).slice(2,10).toUpperCase();
}

/* ═══════════════════════════════════════════
   UI LANG
═══════════════════════════════════════════ */
function applyLang() {
  const lang = document.getElementById('inp-lang').value;
  STATE.lang = lang;
  const t = UI[lang];
  const rtl = ['ar','fa'].includes(lang);
  document.documentElement.setAttribute('dir', rtl ? 'rtl' : 'ltr');
  document.documentElement.lang = lang;
  document.getElementById('lbl-name').textContent    = t.name;
  document.getElementById('lbl-lang').textContent    = t.lang;
  document.getElementById('lbl-conv').textContent    = t.conv;
  document.getElementById('hint-conv').textContent   = t.hintConv;
  document.getElementById('lbl-fontsize').textContent= t.fontsize;
  document.getElementById('btn-start').textContent   = t.start;
  document.querySelector('.tagline').textContent     = t.logoTag;
}

/* ═══════════════════════════════════════════
   FONT SIZE
═══════════════════════════════════════════ */
function changeFont(delta) {
  STATE.fontSize = Math.min(24, Math.max(12, STATE.fontSize + delta));
  document.documentElement.style.setProperty('--font-size-base', STATE.fontSize + 'px');
  save();
}

/* ═══════════════════════════════════════════
   SETUP → CHAT
═══════════════════════════════════════════ */
function startChat() {
  const name = document.getElementById('inp-name').value.trim();
  const conv = document.getElementById('inp-conv').value.trim().toUpperCase();

  if (!name) { showToast('⚠ ' + (STATE.lang === 'fr' ? 'Entrez votre prénom.' : 'Enter your name.')); return; }
  if (!conv || conv.length < 2) { showToast('⚠ ' + (STATE.lang === 'fr' ? 'Code de session requis.' : 'Session code required.')); return; }

  STATE.name = name;
  STATE.conv = conv;
  if (!STATE.userId) STATE.userId = genUserId();
  save();

  document.getElementById('screen-setup').classList.remove('active');
  document.getElementById('screen-chat').classList.add('active');
  initChat();
}

function goSetup() {
  if (STATE.pollInterval) clearInterval(STATE.pollInterval);
  document.getElementById('screen-chat').classList.remove('active');
  document.getElementById('screen-setup').classList.add('active');
  document.getElementById('inp-name').value = STATE.name;
  document.getElementById('inp-lang').value = STATE.lang;
  document.getElementById('inp-conv').value = STATE.conv;
  applyLang();
}

/* ═══════════════════════════════════════════
   CHAT INIT
═══════════════════════════════════════════ */
function initChat() {
  const t = UI[STATE.lang];
  const rtl = ['ar','fa'].includes(STATE.lang);
  document.documentElement.setAttribute('dir', rtl ? 'rtl' : 'ltr');

  document.getElementById('conv-badge').textContent  = STATE.conv;
  document.getElementById('header-name').textContent = STATE.name;
  document.getElementById('lang-dot').textContent    = STATE.lang.toUpperCase();
  document.getElementById('empty-text').textContent  = t.emptyWait;
  document.getElementById('status-label').textContent= t.statusWaiting;

  buildCategories();
  setupPolling();
}

/* ═══════════════════════════════════════════
   CATEGORIES + MESSAGE GRID
═══════════════════════════════════════════ */
function buildCategories() {
  const cats = MSG[STATE.lang] || MSG.fr;
  const strip = document.getElementById('category-strip');
  strip.innerHTML = '';
  cats.forEach((cat, i) => {
    const pill = document.createElement('button');
    pill.className = 'cat-pill' + (i === STATE.selectedCat ? ' active' : '');
    pill.textContent = cat.cat;
    pill.onclick = () => selectCat(i);
    strip.appendChild(pill);
  });
  selectCat(STATE.selectedCat);
}

function selectCat(i) {
  STATE.selectedCat = i;
  STATE.selectedMsg = null;
  updateSendPreview();
  document.querySelectorAll('.cat-pill').forEach((p,j) => {
    p.classList.toggle('active', j===i);
  });
  const cats = MSG[STATE.lang] || MSG.fr;
  const grid = document.getElementById('messages-grid');
  grid.innerHTML = '';
  cats[i].items.forEach(item => {
    const el = document.createElement('button');
    el.className = 'msg-item';
    el.textContent = item.t;
    el.dataset.id  = item.id;
    el.onclick = () => selectMsg(item, el);
    grid.appendChild(el);
  });
}

function selectMsg(item, el) {
  document.querySelectorAll('.msg-item').forEach(e => e.classList.remove('selected'));
  el.classList.add('selected');
  STATE.selectedMsg = item;
  updateSendPreview();
}

function updateSendPreview() {
  const prev = document.getElementById('selected-preview');
  const txt  = document.getElementById('sel-prev-text');
  const btn  = document.getElementById('btn-send');
  if (STATE.selectedMsg) {
    prev.classList.add('has-msg');
    txt.textContent = STATE.selectedMsg.t;
    btn.disabled = false;
  } else {
    prev.classList.remove('has-msg');
    txt.textContent = UI[STATE.lang].sendPlaceholder;
    btn.disabled = true;
  }
}

/* ═══════════════════════════════════════════
   SUPABASE POLLING
═══════════════════════════════════════════ */
function setupPolling() {
  // Load Supabase SDK then connect
  if (!window.supabase) {
    const s = document.createElement('script');
    s.src = 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js';
    s.onload = () => connectAndPoll();
    s.onerror = () => showToast('❌ Erreur chargement SDK.');
    document.head.appendChild(s);
  } else {
    connectAndPoll();
  }
}

function connectAndPoll() {
  try {
    STATE.supaClient = window.supabase.createClient(SUPA_URL, SUPA_KEY);
    loadHistory();
    // Poll every 3 seconds
    STATE.pollInterval = setInterval(pollNewMessages, 3000);
    setStatus('connected');
  } catch(e) {
    showToast('❌ Supabase : ' + e.message);
  }
}

async function loadHistory() {
  try {
    const { data } = await STATE.supaClient
      .from('ponti_messages')
      .select('*')
      .eq('conv_id', STATE.conv)
      .order('created_at', { ascending: true })
      .limit(100);
    if (data && data.length) {
      data.forEach(row => renderMsg(row, false));
      STATE.lastMsgId = data[data.length - 1].id;
    }
  } catch(e) { console.warn('loadHistory', e); }
}

async function pollNewMessages() {
  if (!STATE.supaClient) return;
  try {
    let query = STATE.supaClient
      .from('ponti_messages')
      .select('*')
      .eq('conv_id', STATE.conv)
      .order('created_at', { ascending: true });
    if (STATE.lastMsgId) query = query.gt('id', STATE.lastMsgId);
    const { data } = await query;
    if (data && data.length) {
      data.forEach(row => {
        if (row.sender_id !== STATE.userId) renderMsg(row, true);
      });
      STATE.lastMsgId = data[data.length - 1].id;
    }
  } catch(e) { console.warn('poll', e); }
}

/* ═══════════════════════════════════════════
   SEND
═══════════════════════════════════════════ */
async function sendMessage() {
  if (!STATE.selectedMsg) return;
  const msg = STATE.selectedMsg;

  const row = {
    conv_id:   STATE.conv,
    sender_id: STATE.userId,
    sender_name: STATE.name,
    sender_lang: STATE.lang,
    msg_id:    msg.id,
    msg_text:  msg.t
  };

  // Optimistic render
  renderMsg({ ...row, created_at: new Date().toISOString() }, false, true);

  // Clear selection
  STATE.selectedMsg = null;
  document.querySelectorAll('.msg-item').forEach(e => e.classList.remove('selected'));
  updateSendPreview();

  if (STATE.supaClient) {
    try {
      await STATE.supaClient.from('ponti_messages').insert(row);
    } catch(e) {
      showToast('❌ Envoi échoué.');
    }
  } else {
    showToast('⏳ Connexion en cours…');
  }
}

/* ═══════════════════════════════════════════
   RENDER MESSAGE
═══════════════════════════════════════════ */
function renderMsg(row, animate, isMine) {
  const area = document.getElementById('messages-area');
  const empty = document.getElementById('empty-state');
  if (empty) empty.style.display = 'none';

  const mine = isMine !== undefined ? isMine : (row.sender_id === STATE.userId);

  // Find equivalent in user's lang (if theirs)
  let equiv = null;
  if (!mine && row.msg_id) {
    const userCats = MSG[STATE.lang] || MSG.fr;
    for (const cat of userCats) {
      const item = cat.items.find(i => i.id === row.msg_id);
      if (item) { equiv = item.t; break; }
    }
  }

  const row_el = document.createElement('div');
  row_el.className = 'msg-row ' + (mine ? 'mine' : 'theirs');
  if (animate) row_el.style.animation = 'fadeUp 0.25s ease';

  const bubble = document.createElement('div');
  bubble.className = 'msg-bubble';
  bubble.textContent = row.msg_text;
  row_el.appendChild(bubble);

  if (equiv && !mine) {
    const eq = document.createElement('div');
    eq.className = 'msg-equiv';
    eq.textContent = '↳ ' + equiv;
    row_el.appendChild(eq);
  }

  const meta = document.createElement('div');
  meta.className = 'msg-meta';
  const time = new Date(row.created_at).toLocaleTimeString(STATE.lang, {hour:'2-digit', minute:'2-digit'});
  meta.textContent = (mine ? (UI[STATE.lang].youSent || 'Vous') : (row.sender_name || '')) + ' · ' + time;
  row_el.appendChild(meta);

  area.appendChild(row_el);
  area.scrollTop = area.scrollHeight;
}

/* ═══════════════════════════════════════════
   STATUS
═══════════════════════════════════════════ */
function setStatus(s) {
  const dot   = document.getElementById('status-dot');
  const label = document.getElementById('status-label');
  dot.className = 'status-dot ' + s;
  label.textContent = s === 'connected' ? UI[STATE.lang].statusConnected : UI[STATE.lang].statusWaiting;
}

/* ═══════════════════════════════════════════
   TOAST
═══════════════════════════════════════════ */
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

/* ═══════════════════════════════════════════

═══════════════════════════════════════════ */
load();
document.getElementById('inp-lang').value = STATE.lang;
document.getElementById('inp-name').value = STATE.name;
document.getElementById('inp-conv').value = STATE.conv;
document.documentElement.style.setProperty('--font-size-base', STATE.fontSize + 'px');
applyLang();
</script>
